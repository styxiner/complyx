version: '3.8'

services:
  db:
    image: postgres:18.1-alpine3.23
    container_name: complyx-db
    environment:
      POSTGRES_USER: complyx
      POSTGRES_PASSWORD: complyx
      POSTGRES_DB: complyx-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
    driver: local
